name: CI/CD Build and Deploy to Home K8s

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Dependencies Natively
        run: |
          composer clear-cache
          COMPOSER_MEMORY_LIMIT=-1 composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          driver: docker
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy Manifest directly to Cluster
        run: |
          # 1. Apply any changes made to the yii2-cms.yaml manifest
          kubectl apply -f ~/k8s/yii2-cms.yaml
          
          # 2. Force a rolling restart to pull the fresh image layers from GHCR
          kubectl rollout restart deployment/yii2-cms-deployment
          
          # 3. Wait for the new pod to be completely ready before running migrations
          kubectl rollout status deployment/yii2-cms-deployment --timeout=90s
          
          # 4. Find the name of the newly created running pod
          POD_NAME=$(kubectl get pods -l app=yii2-cms -o jsonpath="{.items[0].metadata.name}")
          
          # 5. Run the Yii migration command inside that pod automatically
          kubectl exec $POD_NAME -- php yii migrate --interactive=0