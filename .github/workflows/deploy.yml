name: Build and Deploy to K8s
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted  # This targets your Ubuntu server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t citybuilder-cms:${{ github.sha }} .
          # If using a local registry (like MicroK8s or Minikube), tag and push
          docker tag yii2-app:${{ github.sha }} localhost:5000/citybuilder-cms:latest
          docker push localhost:5000/citybuilder-cms:latest

      - name: Deploy to Kubernetes
        run: |
          # Use kubectl directly since it's already configured on the server
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/citybuilder-cms php=localhost:5000/citybuilder-cms:latest
          kubectl rollout status deployment/citybuilder-cms
